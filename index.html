<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Protected Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            :root{
                --bg:#0e1013; --panel:#14161b; --panel2:#191c22; --line:#23262e; --line2:#2c303a;
                --txt:#e7e9ed; --muted:#868c97; --faint:#555a64; --acc:#5b93e0; --acc-soft:rgba(91,147,224,.12); --acc-line:rgba(91,147,224,.34);
            }
            .staticrypt-html{height:100%}
            .staticrypt-body{height:100%;margin:0}
            .staticrypt-content{
                height:100%;margin-bottom:1em;background:var(--bg);color:var(--txt);
                font-family:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;
                -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
            }
            .staticrypt-page{width:380px;padding:9% 0 0;margin:auto;box-sizing:border-box}
            .staticrypt-form{
                position:relative;z-index:1;background:var(--panel);max-width:380px;margin:0 auto 100px;
                padding:40px 38px;text-align:center;border:1px solid var(--line);border-radius:14px;
                box-shadow:0 16px 50px rgba(0,0,0,.45);
            }
            .gate-mark{
                width:46px;height:46px;border-radius:11px;background:var(--acc-soft);border:1px solid var(--acc-line);
                display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
            }
            .gate-mark svg{width:20px;height:20px;fill:var(--acc)}
            .staticrypt-title{font-size:1.18em;font-weight:600;letter-spacing:.01em;color:var(--txt);margin:0}
            .staticrypt-instructions{margin-bottom:1.2em}
            .staticrypt-instructions p:not(.staticrypt-title){font-size:.82em;color:var(--muted);margin:.7em 0 0;line-height:1.5}
            .staticrypt-hr{margin:20px 0;border:0;border-top:1px solid var(--line)}
            .staticrypt-password-container{
                position:relative;outline:0;background:var(--panel2);width:100%;border:1px solid var(--line2);
                border-radius:9px;margin:0 0 14px;box-sizing:border-box;transition:border-color .15s;
            }
            .staticrypt-password-container:focus-within{border-color:var(--acc-line)}
            .staticrypt-form input[type="password"],input[type="text"]{
                background:transparent;border:0;box-sizing:border-box;font-size:14px;outline:0;
                padding:14px 38px 14px 15px;width:100%;color:var(--txt);
            }
            .staticrypt-form input::placeholder{color:var(--faint)}
            .staticrypt-toggle-password-visibility{
                cursor:pointer;height:18px;width:18px;opacity:.85;padding:13px;position:absolute;right:0;
                top:50%;transform:translateY(-50%);filter:invert(85%);
            }
            .staticrypt-form .staticrypt-decrypt-button{
                outline:0;background:var(--acc);width:100%;border:0;padding:14px;color:#ffffff;
                font-size:14px;font-weight:600;cursor:pointer;border-radius:9px;letter-spacing:.01em;
                transition:filter .15s;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus{filter:brightness(110%)}
            label.staticrypt-remember{display:flex;align-items:center;justify-content:center;margin-bottom:1em;font-size:.82em;color:var(--muted)}
            .staticrypt-remember input[type="checkbox"]{transform:scale(1.3);margin-right:.8em;accent-color:var(--acc)}
            .gate-foot{font-size:.68em;color:var(--faint);margin-top:6px;letter-spacing:.04em}
            .hidden{display:none !important}
            .staticrypt-spinner-container{height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg)}
            .staticrypt-spinner{
                display:inline-block;width:2rem;height:2rem;vertical-align:text-bottom;
                border:.25em solid var(--line2);border-right-color:var(--acc);border-radius:50%;
                animation:spinner-border .75s linear infinite;
            }
            @keyframes spinner-border{100%{transform:rotate(360deg)}}
            @media screen and (-webkit-min-device-pixel-ratio:0){
                .staticrypt-form input[type="password"],input[type="text"]{font-size:16px}
            }
        </style>
    </head>

    <body class="staticrypt-body">
        <div id="staticrypt_loading" class="staticrypt-spinner-container">
            <div class="staticrypt-spinner"></div>
        </div>

        <div id="staticrypt_content" class="staticrypt-content hidden">
            <div class="staticrypt-page">
                <div class="staticrypt-form">
                    <div class="staticrypt-instructions">
                        <div class="gate-mark">
                            <svg viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg"><path d="M144 144v48h160v-48a80 80 0 0 0-160 0zM96 192v-48a128 128 0 0 1 256 0v48h16a48 48 0 0 1 48 48v176a48 48 0 0 1-48 48H80a48 48 0 0 1-48-48V240a48 48 0 0 1 48-48h16z"/></svg>
                        </div>
                        <p class="staticrypt-title">Protected Page</p>
                        <p></p>
                    </div>

                        </div>

                            <input id="staticrypt-remember" type="checkbox" name="remember" />
                            Remember me
                        </label>

                        <input type="submit" class="staticrypt-decrypt-button" value="DECRYPT" />
                    </form>
                    <div class="gate-foot">conteúdo protegido</div>
                </div>
            </div>
        </div>
